; Sigil Strike — move balance tunables
; Edit values here and restart the game to apply.
; This file is read at startup; missing keys fall back to built-in defaults.

[balance]
; ── Damage & healing ────────────────────────────────────────────────────
WEAK_MOVE_DAMAGE   = 25
STRONG_MOVE_DAMAGE = 45
HEAL_AMOUNT        = 35

; Each attack/heal rolls an integer offset in [-DAMAGE_VARIANCE, +DAMAGE_VARIANCE]
; applied to the base value above. Set to 0 to disable randomness.
DAMAGE_VARIANCE = 5

; Multiplier applied to Mend's heal output once deathmatch is active. Must be
; small enough that max heal-per-second stays below DEATHMATCH_HP_PER_SEC,
; otherwise healing can outrun the decay and the match still drags on.
DEATHMATCH_HEAL_MULT = 0.25

; ── Shield Wall ────────────────────────────────────────────────────────
SHIELD_VS_STRONG_DAMAGE_PCT = 0.20
SHIELD_VS_WEAK_REFLECT_PCT  = 0.30

; ── Dodge Roll ─────────────────────────────────────────────────────────
DODGE_VS_STRONG_CHANCE = 0.33
DODGE_VS_WEAK_CHANCE   = 0.70

; ── Action sequences required to perform each move ─────────────────────
; Comma-separated lists of action names (move1..move5).
; Power Strike matches any 3 identical actions.
; Mend matches any X-Y-X where X != Y.
STRONG_MOVE_SEQUENCE = move1,move2,move3
SHIELD_SEQUENCE      = move3,move4,move5
DODGE_SEQUENCE       = move1,move3,move5
