; Sigil Strike — gameplay timing tunables
; Edit values here and restart the game to apply.
; This file is read at startup; missing keys fall back to built-in defaults.

[timing]
; Seconds between each automatic round resolution.
RESOLVE_INTERVAL = 5.0

; Seconds the entered combo is shown in the action-buffer strip after a
; completed combo. Can also be overridden at runtime via the
; COMBO_DISPLAY_TIME environment variable.
COMBO_DISPLAY_TIME = 1.0

; Seconds of cooldown enforced between consecutive recognised hand-sign
; actions, to prevent a single held gesture from registering repeatedly.
; Overridable at runtime via the ACTION_COOLDOWN env var.
ACTION_COOLDOWN = 0.5

; Seconds an event message ("P1: Combo Blast vs P2: Shield Wall", etc.)
; stays visible after a round resolves.
EVENT_MESSAGE_DURATION = 4.0

; Seconds of inactivity after a partial combo before the action buffer is
; auto-cleared. Resets every time the player adds another action.
ACTION_BUFFER_TIMEOUT = 5.0

; ── Deathmatch (passive HP decay to force a finish) ────────────────────
; Match elapsed time at which passive HP decay kicks in.
DEATHMATCH_START_SEC = 180.0
; HP drained from BOTH players per second once deathmatch is active.
DEATHMATCH_HP_PER_SEC = 2.0
; How many seconds before DEATHMATCH_START_SEC the on-screen countdown appears.
DEATHMATCH_COUNTDOWN_SEC = 30.0
